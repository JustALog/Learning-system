version: '3.8'

services:
  # ============================================
  # MySQL Database
  # ============================================
  db:
    image: mysql:8.0
    container_name: course-management-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-course_management}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASS:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      interval: 10s

  # ============================================
  # Backend Server (Node.js + Express)
  # ============================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: course-management-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-course_management}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here_change_this_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./server/src:/app/src
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      timeout: 10s
      retries: 5
      interval: 10s

  # ============================================
  # Frontend (React + Vite + Nginx)
  # ============================================
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: course-management-frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      timeout: 10s
      retries: 5
      interval: 10s

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
